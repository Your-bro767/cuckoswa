<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivo · Catálogo de descargas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #12151a;
    --ink-soft: #1b2028;
    --paper: #eceadf;
    --paper-line: #d7d3c2;
    --text-dark: #23261f;
    --text-mute: #6b6a5e;
    --stamp-red: #b23a2a;
    --brass: #a9884a;
    --teal: #3c6e63;
    --focus: #e8b04b;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }

  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.03), transparent 40%),
      var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  a{ color: inherit; }

  .wrap{ max-width: 980px; margin: 0 auto; }

  /* header, styled like a drawer label */
  header{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 24px;
    border-bottom: 2px solid rgba(236,234,223,0.15);
    padding-bottom: 24px;
    margin-bottom: 36px;
  }

  .tab{
    display:inline-block;
    background: var(--brass);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 3px 3px 0 0;
    margin-bottom: 10px;
  }

  h1{
    font-family: 'Special Elite', cursive;
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 2.8rem);
    letter-spacing: 0.01em;
    color: var(--paper);
  }

  header p{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: rgba(236,234,223,0.55);
    margin-top: 6px;
  }

  .search-box{
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--ink-soft);
    border: 1px solid rgba(236,234,223,0.18);
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 240px;
  }

  .search-box svg{ flex-shrink:0; opacity: 0.6; }

  .search-box input{
    background: none;
    border: none;
    outline: none;
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    width: 100%;
  }

  .search-box input::placeholder{ color: rgba(236,234,223,0.4); }

  .search-box input:focus-visible{ outline: none; }
  .search-box:focus-within{ border-color: var(--focus); }

  /* filter row */
  .filters{
    display:flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .filter-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid rgba(236,234,223,0.25);
    color: rgba(236,234,223,0.7);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-btn:hover{ border-color: var(--brass); color: var(--paper); }
  .filter-btn.active{ background: var(--brass); border-color: var(--brass); color: var(--ink); }
  .filter-btn:focus-visible{ outline: 2px solid var(--focus); outline-offset: 2px; }

  /* grid of cards */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
  }

  .card{
    position: relative;
    background: var(--paper);
    color: var(--text-dark);
    border-radius: 3px;
    padding: 22px 20px 18px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 27px,
      var(--paper-line) 28px
    );
    animation: rise 0.5s ease backwards;
  }

  .grid .card:nth-child(1){ animation-delay: 0.02s; }
  .grid .card:nth-child(2){ animation-delay: 0.06s; }
  .grid .card:nth-child(3){ animation-delay: 0.10s; }
  .grid .card:nth-child(4){ animation-delay: 0.14s; }
  .grid .card:nth-child(5){ animation-delay: 0.18s; }
  .grid .card:nth-child(6){ animation-delay: 0.22s; }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .stamp{
    position:absolute;
    top: 14px;
    right: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--stamp-red);
    border: 1.5px solid var(--stamp-red);
    border-radius: 4px;
    padding: 2px 7px;
    transform: rotate(6deg);
    opacity: 0.85;
  }

  .stamp.doc{ color: var(--teal); border-color: var(--teal); }

  .card h2{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    padding-right: 60px;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .meta{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-mute);
    margin-bottom: 10px;
  }

  .desc{
    font-size: 0.85rem;
    line-height: 1.5;
    color: #3a3d33;
    margin-bottom: 16px;
    min-height: 20px;
  }

  .btn-download{
    display:inline-flex;
    align-items:center;
    gap: 8px;
    background: var(--ink);
    color: var(--paper);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 9px 14px;
    border-radius: 4px;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .btn-download:hover{ background: var(--stamp-red); transform: translateY(-1px); }
  .btn-download:focus-visible{ outline: 2px solid var(--focus); outline-offset: 2px; }

  .preview{ margin-bottom: 12px; }
  .thumb{ width: 100%; height: 140px; object-fit: cover; border-radius: 4px; background: #000; display:block; }
  /* empty state */
  .empty{
    text-align: center;
    padding: 60px 20px;
    color: rgba(236,234,223,0.5);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
  }

  footer{
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid rgba(236,234,223,0.12);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: rgba(236,234,223,0.4);
    display:flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <span class="tab">CAJÓN 01</span>
      <h1>Archivo</h1>
      <p id="count-label">— archivos disponibles</p>
    </div>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="search" type="text" placeholder="Buscar por nombre…" aria-label="Buscar archivo">
    </div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty" hidden>No hay archivos que coincidan con tu búsqueda.</div>

  <footer>
    <span>Actualizado por última vez: <span id="updated"></span></span>
    <span>Catálogo estático · sin cuentas, sin rastreo</span>
  </footer>
</div>

<script>
  /* =====================================================================
     CÓMO AÑADIR UN ARCHIVO NUEVO
     ---------------------------------------------------------------------
     1. Sube el archivo real a tu repositorio, por ejemplo dentro de una
        carpeta /files (ej: files/mi-video.mp4), o súbelo a un servicio
        externo (Google Drive, Dropbox, etc. con enlace de descarga
        directa) si pesa demasiado para GitHub (>100MB por archivo).
     2. Agrega un objeto nuevo al arreglo FILES de abajo con sus datos.
     3. Guarda y sube los cambios (git add / commit / push). GitHub Pages
        se actualiza solo en un par de minutos.
     No hace falta backend ni base de datos: esta página es 100% estática.
     ===================================================================== */

  const FILES = [
    {
      name: "[Daemon Hentai] GeeWhy Collection [Akira].mp4",
      category: "video",
      size: "209 MB",
      date: "2026-07-07",
      desc: "Colleccion de videos de GeeWhy",
      url: "https://drive.google.com/uc?export=download&id=1hYpMZsdORtzPZ98b76t_zETTxHFucgWJ"
    }
  ];

  const LAST_UPDATED = "07/07/2026";

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const searchInput = document.getElementById('search');
  const countLabel = document.getElementById('count-label');
  const filtersEl = document.getElementById('filters');
  document.getElementById('updated').textContent = LAST_UPDATED;

  let activeCategory = 'todos';

  function formatDate(iso){
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function isSameOrigin(url){
    try{
      const u = new URL(url, location.href);
      return u.origin === location.origin;
    }catch(e){ return false; }
  }

  // Descarga programática simple (limitada a archivos accesibles desde el mismo origen)
  function downloadFile(url, filename, button){
    if(button) button.textContent = 'Descargando...';
    fetch(url).then(res => {
      if(!res.ok) throw new Error('Respuesta no válida');
      return res.blob();
    }).then(blob => {
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || '';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(blobUrl);
      if(button) button.textContent = 'Descargar';
    }).catch(err => {
      if(button) button.textContent = 'Descargar';
      alert('Error al descargar: ' + err.message);
    });
  }

  function render(){
    const q = searchInput.value.trim().toLowerCase();
    const filtered = FILES.filter(f => {
      const matchesQuery = f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q);
      const matchesCat = activeCategory === 'todos' || f.category === activeCategory;
      return matchesQuery && matchesCat;
    });

    countLabel.textContent = `${filtered.length} archivo${filtered.length === 1 ? '' : 's'} disponible${filtered.length === 1 ? '' : 's'}`;

    grid.innerHTML = '';
    empty.hidden = filtered.length !== 0;

    filtered.forEach(f => {
      const card = document.createElement('div');
      card.className = 'card';
      const stampClass = f.category === 'doc' ? 'stamp doc' : 'stamp';
      const stampLabel = f.category === 'doc' ? 'DOCUMENTO' : 'VIDEO';
      const sameOrigin = isSameOrigin(f.url);
      const previewHtml = (f.category === 'video' && sameOrigin) ? `<div class="preview"><video class="thumb" src="${f.url}" preload="metadata" muted playsinline></video></div>` : '';
      card.innerHTML = `
        <span class="${stampClass}">${stampLabel}</span>
        <h2>${f.name}</h2>
        <div class="meta">${f.size} · ${formatDate(f.date)}</div>
        <p class="desc">${f.desc}</p>
        ${previewHtml}
        <a class="btn-download" href="${f.url}" ${sameOrigin ? 'download' : 'target="_blank" rel="noopener"'}>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Descargar
        </a>
      `;
      grid.appendChild(card);

      const btn = card.querySelector('.btn-download');
      if(btn){
        if(f.category === 'video' && sameOrigin){
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            downloadFile(f.url, f.name, btn);
          });
          const vid = card.querySelector('.thumb');
          if(vid){
            vid.addEventListener('mouseenter', () => { vid.play().catch(()=>{}); });
            vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
          }
        } else {
          // cross-origin: open in new tab (browser handles download or preview)
          btn.addEventListener('click', () => {
            // no-op; anchor will open in new tab because of target=_blank
          });
        }
      }
    });
  }

  function buildFilters(){
    const cats = ['todos', ...new Set(FILES.map(f => f.category))];
    const labels = { todos: 'Todos', video: 'Videos', doc: 'Documentos' };
    filtersEl.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
      btn.textContent = labels[cat] || cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      filtersEl.appendChild(btn);
    });
  }

  searchInput.addEventListener('input', render);
  buildFilters();
  render();
</script>

</body>
</html>
